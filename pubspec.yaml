name: arabic_word_puzzle
description: >-
  لعبة كلمات عربية أصلية — صِل الحروف لتكوين كلمات عربية صحيحة.
  Arabic-first word connect puzzle game built with Flutter, Riverpod and Firebase.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.0

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Fonts (Cairo / Tajawal — Arabic-first typography)
  google_fonts: ^6.2.1

  # Firebase (compile-safe; runtime activation requires `flutterfire configure`,
  # then set AppConfig.useFirebase = true)
  firebase_core: ^3.3.0
  cloud_firestore: ^5.2.0
  firebase_auth: ^5.1.4

  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/levels.json
    - assets/data/dictionary_ar.txt
