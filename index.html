<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عالم الحروف — ألعاب الكلمات</title>
<meta name="description" content="مجموعة ألعاب حروف وكلمات بالعربي والإنجليزي مع مستويات ونجوم">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+Bhaijaan+2:wght@500;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #17102e;
  --bg2: #241745;
  --surface: #2c1d54;
  --surface2: #3a2a6b;
  --tile: #ffc93c;
  --tile-edge: #d9a416;
  --good: #2ee6a8;
  --good-edge: #17b57f;
  --warn: #6c8cff;
  --bad: #ff5c7a;
  --text: #f6f1ff;
  --muted: #b9a9e8;
  --radius: 16px;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body { height: 100%; }

body {
  font-family: 'Baloo Bhaijaan 2', 'Segoe UI', Tahoma, 'Arial', sans-serif;
  background:
    radial-gradient(1000px 600px at 80% -10%, #3b2470 0%, transparent 60%),
    radial-gradient(800px 500px at -10% 110%, #1f3a6e 0%, transparent 55%),
    var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

#app { max-width: 640px; margin: 0 auto; padding: 12px 14px 40px; }

button { font-family: inherit; color: inherit; cursor: pointer; border: none; background: none; }
button:focus-visible { outline: 3px solid var(--tile); outline-offset: 2px; border-radius: 10px; }

/* ---------- الشريط العلوي ---------- */
.topbar {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 4px; margin-bottom: 6px;
}
.topbar-title { font-size: 1.15rem; font-weight: 800; flex: 1; }
.topbar-right { display: flex; align-items: center; gap: 8px; }
.btn-icon {
  width: 42px; height: 42px; border-radius: 12px;
  background: var(--surface); font-size: 1.3rem; font-weight: 800;
  box-shadow: 0 3px 0 #1c1140;
}
.btn-icon:active { transform: translateY(2px); box-shadow: 0 1px 0 #1c1140; }
.btn-lang {
  padding: 8px 14px; border-radius: 12px; font-weight: 800; font-size: 0.95rem;
  background: linear-gradient(180deg, #7b5cff, #5a3fd6);
  box-shadow: 0 3px 0 #3c2a91;
}
.btn-lang:active { transform: translateY(2px); box-shadow: 0 1px 0 #3c2a91; }
.score-pill {
  display: flex; align-items: center; gap: 5px;
  background: var(--surface); padding: 8px 12px; border-radius: 12px;
  font-weight: 800; box-shadow: 0 3px 0 #1c1140;
}
.score-star { color: var(--tile); }

/* ---------- الرئيسية ---------- */
.hero { position: relative; text-align: center; padding: 26px 10px 20px; overflow: hidden; }
.hero-title {
  font-size: clamp(2.1rem, 8vw, 3rem); font-weight: 800; letter-spacing: 1px;
  background: linear-gradient(180deg, #ffe08a, var(--tile));
  -webkit-background-clip: text; background-clip: text; color: transparent;
  text-shadow: 0 4px 0 rgba(217, 164, 22, 0.25);
  position: relative; z-index: 1;
}
.hero-sub { color: var(--muted); margin-top: 6px; font-weight: 600; position: relative; z-index: 1; }
.float-letters { position: absolute; inset: 0; pointer-events: none; }
.float-ch {
  position: absolute; bottom: -20px; font-size: 1.3rem; font-weight: 800;
  color: rgba(255, 201, 60, 0.16);
  animation: floatUp 9s linear infinite;
}
@keyframes floatUp {
  from { transform: translateY(0) rotate(0deg); opacity: 0; }
  15% { opacity: 1; }
  to { transform: translateY(-140px) rotate(25deg); opacity: 0; }
}

.game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
@media (max-width: 430px) { .game-grid { grid-template-columns: 1fr; } }
.game-card {
  text-align: inherit;
  background: linear-gradient(180deg, var(--surface2), var(--surface));
  border-radius: var(--radius); padding: 18px 16px 14px;
  box-shadow: 0 5px 0 #1c1140, 0 12px 24px rgba(0, 0, 0, 0.25);
  display: flex; flex-direction: column; gap: 10px;
  transition: transform 0.15s ease;
}
.game-card:hover { transform: translateY(-3px); }
.game-card:active { transform: translateY(2px); box-shadow: 0 2px 0 #1c1140; }
.game-icon { font-size: 2.2rem; }
.game-info h3 { font-size: 1.2rem; font-weight: 800; }
.game-info p { color: var(--muted); font-size: 0.86rem; margin-top: 3px; line-height: 1.5; }
.game-meta { display: flex; justify-content: space-between; font-weight: 700; font-size: 0.9rem; }
.game-progress { color: var(--muted); }
.game-stars { color: var(--tile); }
.foot { text-align: center; color: var(--muted); font-size: 0.8rem; margin-top: 26px; }

/* ---------- المستويات ---------- */
.levels-wrap { padding-top: 8px; }
.levels-lang {
  text-align: center; color: var(--muted); font-weight: 700; margin-bottom: 14px;
  background: var(--surface); display: table; margin-inline: auto;
  padding: 6px 16px; border-radius: 999px;
}
.levels-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(88px, 1fr)); gap: 12px; }
.level-btn {
  background: linear-gradient(180deg, var(--surface2), var(--surface));
  border-radius: 14px; padding: 12px 6px 10px;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  box-shadow: 0 4px 0 #1c1140;
}
.level-btn:not(.locked):active { transform: translateY(2px); box-shadow: 0 1px 0 #1c1140; }
.level-btn.locked { opacity: 0.45; cursor: not-allowed; }
.level-num { font-size: 1.4rem; font-weight: 800; }

.stars { display: flex; gap: 2px; }
.star { color: #4a3a80; font-size: 0.95rem; }
.star.on { color: var(--tile); text-shadow: 0 0 8px rgba(255, 201, 60, 0.6); }
.stars-lg .star { font-size: 2rem; }

/* ---------- منطقة اللعب ---------- */
.play-area { display: flex; flex-direction: column; align-items: center; gap: 14px; padding-top: 6px; }
.hint-line {
  background: var(--surface); color: var(--text);
  padding: 8px 16px; border-radius: 999px; font-weight: 700; font-size: 0.95rem;
  text-align: center;
}
.play-msg { min-height: 1.4em; color: var(--bad); font-weight: 700; text-align: center; }

/* ---------- البلاطات (العنصر المميز) ---------- */
.tile {
  width: 52px; height: 52px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.5rem; font-weight: 800; color: #3a2a00;
  background: linear-gradient(180deg, #ffe08a, var(--tile));
  box-shadow: 0 4px 0 var(--tile-edge);
  user-select: none;
}
.tile.slot { background: var(--surface); box-shadow: inset 0 0 0 2px #4a3a80; color: var(--text); }
.tile.slot.filled { box-shadow: inset 0 0 0 2px var(--tile); }
.tile.pick:active { transform: translateY(3px); box-shadow: 0 1px 0 var(--tile-edge); }
.tile.pick.used { opacity: 0.25; pointer-events: none; }
.tile.correct { background: linear-gradient(180deg, #7ff5cd, var(--good)); box-shadow: 0 4px 0 var(--good-edge); color: #013a28; }
.tile.present { background: linear-gradient(180deg, #9cb4ff, var(--warn)); box-shadow: 0 4px 0 #3d5fd6; color: #0b1a52; }
.tile.absent { background: #453764; box-shadow: 0 4px 0 #2b2145; color: #9c8ec4; }
.tile.wrong { animation: shake 0.4s; box-shadow: inset 0 0 0 2px var(--bad); }
.tile.flip { animation: flip 0.45s ease; }
@keyframes flip { 0% { transform: rotateX(0); } 50% { transform: rotateX(90deg); } 100% { transform: rotateX(0); } }
@keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }

/* ---------- وردل ---------- */
.wordle-board { display: flex; flex-direction: column; gap: 7px; }
.wordle-row { display: flex; gap: 7px; }
.wordle-row .tile { background: var(--surface); box-shadow: inset 0 0 0 2px #4a3a80; color: var(--text); }
.wordle-row .tile.filled { box-shadow: inset 0 0 0 2px var(--tile); }
.wordle-row .tile.correct { background: linear-gradient(180deg, #7ff5cd, var(--good)); box-shadow: 0 4px 0 var(--good-edge); color: #013a28; }
.wordle-row .tile.present { background: linear-gradient(180deg, #9cb4ff, var(--warn)); box-shadow: 0 4px 0 #3d5fd6; color: #0b1a52; }
.wordle-row .tile.absent { background: #453764; box-shadow: 0 4px 0 #2b2145; color: #9c8ec4; }

/* ---------- لوحة المفاتيح ---------- */
.keyboard { display: flex; flex-direction: column; gap: 6px; width: 100%; max-width: 520px; margin-top: 4px; }
.kb-row { display: flex; gap: 5px; justify-content: center; }
.kb-key {
  flex: 1; max-width: 46px; min-width: 0; height: 48px;
  border-radius: 9px; font-size: 1.05rem; font-weight: 800;
  background: var(--surface2); box-shadow: 0 3px 0 #1c1140;
}
.kb-key:active { transform: translateY(2px); box-shadow: 0 1px 0 #1c1140; }
.kb-key:disabled { cursor: default; }
.kb-wide { max-width: 64px; flex: 1.4; background: linear-gradient(180deg, #7b5cff, #5a3fd6); box-shadow: 0 3px 0 #3c2a91; }
.kb-key.correct { background: var(--good); color: #013a28; box-shadow: 0 3px 0 var(--good-edge); }
.kb-key.present { background: var(--warn); color: #0b1a52; box-shadow: 0 3px 0 #3d5fd6; }
.kb-key.absent { background: #2b2145; color: #7a6ba8; box-shadow: 0 3px 0 #1a1230; }

/* ---------- رتّب الحروف ---------- */
.scr-answer, .scr-pool { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; max-width: 100%; }
.scr-pool { margin-top: 4px; }
.btn {
  padding: 10px 20px; border-radius: 12px; font-weight: 800; font-size: 1rem;
  background: var(--surface2); box-shadow: 0 3px 0 #1c1140;
}
.btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #1c1140; }
.btn.primary { background: linear-gradient(180deg, #7ff5cd, var(--good)); color: #013a28; box-shadow: 0 3px 0 var(--good-edge); }

/* ---------- أنقذ القلوب ---------- */
.hearts { display: flex; gap: 4px; font-size: 1.4rem; }
.heart.lost { opacity: 0.55; }
.hm-word { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }

/* ---------- الذاكرة ---------- */
.mem-grid { display: grid; gap: 8px; width: 100%; max-width: 520px; }
.mem-card { perspective: 600px; aspect-ratio: 3 / 3.4; min-width: 0; }
.mem-inner {
  position: relative; width: 100%; height: 100%;
  transform-style: preserve-3d; transition: transform 0.4s;
}
.mem-card.open .mem-inner, .mem-card.done .mem-inner { transform: rotateY(180deg); }
.mem-face {
  position: absolute; inset: 0; backface-visibility: hidden;
  border-radius: 12px; display: flex; align-items: center; justify-content: center;
  font-weight: 800; padding: 4px;
}
.mem-front {
  background: linear-gradient(180deg, var(--surface2), var(--surface));
  box-shadow: 0 4px 0 #1c1140; font-size: 1.5rem; color: var(--muted);
}
.mem-back {
  transform: rotateY(180deg);
  background: linear-gradient(180deg, #ffe08a, var(--tile));
  box-shadow: 0 4px 0 var(--tile-edge); color: #3a2a00;
  font-size: clamp(0.8rem, 3.6vw, 1.05rem); text-align: center; word-break: break-word;
}
.mem-back.mem-en { font-size: clamp(0.7rem, 3.2vw, 0.95rem); }
.mem-card.done .mem-back {
  background: linear-gradient(180deg, #7ff5cd, var(--good));
  box-shadow: 0 4px 0 var(--good-edge); color: #013a28;
}
.mem-card.done { pointer-events: none; }

/* ---------- النافذة المنبثقة ---------- */
.modal-back {
  position: fixed; inset: 0; background: rgba(10, 6, 25, 0.75);
  display: flex; align-items: center; justify-content: center; z-index: 50;
  padding: 20px; backdrop-filter: blur(3px);
}
.modal {
  background: linear-gradient(180deg, var(--surface2), var(--surface));
  border-radius: 22px; padding: 28px 24px; text-align: center;
  width: 100%; max-width: 360px;
  box-shadow: 0 8px 0 #1c1140, 0 24px 60px rgba(0, 0, 0, 0.5);
  display: flex; flex-direction: column; align-items: center; gap: 12px;
  animation: pop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes pop { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.modal-emoji { font-size: 3rem; }
.modal h2 { font-size: 1.5rem; font-weight: 800; }
.modal-note { color: var(--muted); font-weight: 700; }
.modal-btns { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 6px; }

/* ---------- الاحتفال ---------- */
.confetti {
  position: fixed; top: -12px; width: 10px; height: 14px; z-index: 60;
  border-radius: 3px; pointer-events: none;
  animation: fall linear forwards;
}
@keyframes fall {
  to { transform: translateY(105vh) rotate(var(--rot, 360deg)); opacity: 0.9; }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}

@media (max-width: 400px) {
  .tile { width: 44px; height: 44px; font-size: 1.25rem; }
  .kb-key { height: 44px; font-size: 0.95rem; }
}
</style>
</head>

<script>
/* ============================================================
   عالم الحروف — مجموعة ألعاب الكلمات (عربي / English)

'use strict';

/* ---------------- البيانات ---------------- */
const DATA = {

  },
  scramble: {

      { w: 'قمر', h: 'يضيء في سماء الليل' },
      { w: 'بحر', h: 'ماء واسع ومالح' },

      { w: 'حديقة', h: 'فيها أشجار وأزهار' },
      { w: 'برتقال', h: 'فاكهة لونها برتقالي' },

      { w: 'تلفزيون', h: 'نشاهد عليه البرامج' },
      { w: 'كمبيوتر', h: 'جهاز إلكتروني ذكي' }
    ],
    en: [
      { w: 'SUN', h: 'It shines in the sky' },
      { w: 'CAT', h: 'A pet that says meow' },
      { w: 'BOOK', h: 'You read stories in it' },
      { w: 'FISH', h: 'It swims in water' },
      { w: 'HOUSE', h: 'A place where you live' },
      { w: 'APPLE', h: 'A red or green fruit' },
      { w: 'GARDEN', h: 'Flowers grow here' },
      { w: 'ORANGE', h: 'A fruit and a color' },

    ]
  },
  hangman: {
    ar: [
      { w: 'أسد', c: 'حيوان' },
      { w: 'موز', c: 'فاكهة' },
      { w: 'أحمر', c: 'لون' },
      { w: 'قطار', c: 'مواصلات' },
      { w: 'مدرسة', c: 'مكان' },
      { w: 'برتقال', c: 'فاكهة' },
      { w: 'مستشفى', c: 'مكان' },
      { w: 'فراولة', c: 'فاكهة' },
      { w: 'تمساح', c: 'حيوان' },
      { w: 'زرافة', c: 'حيوان' }
    ],
    en: [
      { w: 'CAT', c: 'Animal' },
      { w: 'BLUE', c: 'Color' },
      { w: 'TRAIN', c: 'Transport' },
      { w: 'SCHOOL', c: 'Place' },
      { w: 'ORANGE', c: 'Fruit' },
      { w: 'MONKEY', c: 'Animal' },
      { w: 'HOSPITAL', c: 'Place' },
      { w: 'ELEPHANT', c: 'Animal' },
      { w: 'BUTTERFLY', c: 'Animal' },
      { w: 'STRAWBERRY', c: 'Fruit' }
    ]
  },
  memoryPairs: [
    ['قط', 'CAT'], ['كلب', 'DOG'], ['شمس', 'SUN'], ['قمر', 'MOON'],
    ['بيت', 'HOUSE'], ['ماء', 'WATER'], ['نار', 'FIRE'], ['كتاب', 'BOOK'],
    ['قلم', 'PEN'], ['باب', 'DOOR'], ['نجم', 'STAR'], ['بحر', 'SEA'],
    ['شجرة', 'TREE'], ['زهرة', 'FLOWER'], ['سيارة', 'CAR'], ['تفاحة', 'APPLE'],
    ['موز', 'BANANA'], ['حليب', 'MILK'], ['خبز', 'BREAD'], ['طائر', 'BIRD']
  ],
  memoryLevels: [4, 5, 6, 8, 10]
};

const GAMES = [
  { id: 'wordle', icon: '🎯', name: 'خمّن الكلمة', desc: 'خمّن الكلمة السرية في ٦ محاولات' },
  { id: 'scramble', icon: '🔀', name: 'رتّب الحروف', desc: 'أعد ترتيب الحروف لتكوين الكلمة' },
  { id: 'hangman', icon: '❤️', name: 'أنقذ القلوب', desc: 'اكشف الكلمة قبل نفاد القلوب' },
  { id: 'memory', icon: '🧠', name: 'ذاكرة الترجمة', desc: 'طابق الكلمة العربية مع الإنجليزية' }
];

const AR_KEY_ROWS = [
  ['ض', 'ص', 'ث', 'ق', 'ف', 'غ', 'ع', 'ه', 'خ', 'ح', 'ج'],
  ['ش', 'س', 'ي', 'ب', 'ل', 'ا', 'ت', 'ن', 'م', 'ك', 'ط'],
  ['ذ', 'د', 'ز', 'ر', 'و', 'ة', 'ى', 'ء', 'أ', 'ظ']
];
const EN_KEY_ROWS = [
  ['Q', 'W', 'E', 'R', 'T', 'Y', 'U', 'I', 'O', 'P'],
  ['A', 'S', 'D', 'F', 'G', 'H', 'J', 'K', 'L'],
  ['Z', 'X', 'C', 'V', 'B', 'N', 'M']
];

/* ---------------- الحالة ---------------- */
const state = {
  lang: 'ar',
  screen: 'home',
  game: null,
  level: 0,
  progress: {}
};

function levelCount(gameId) {
  return gameId === 'memory' ? DATA.memoryLevels.length : DATA[gameId][state.lang].length;
}
function progKey(gameId) {
  return gameId === 'memory' ? gameId : gameId + ':' + state.lang;
}
function getProg(gameId) {
  const k = progKey(gameId);
  if (!state.progress[k]) state.progress[k] = { unlocked: 1, stars: {} };
  return state.progress[k];
}
function totalStars() {
  let s = 0;
  Object.values(state.progress).forEach(function (p) {
    Object.values(p.stars).forEach(function (v) { s += v; });
  });
  return s;
}

/* ---------------- الصوت ---------------- */
let audioCtx = null;
function beep(freq, dur, type, vol) {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type || 'sine';
    o.frequency.value = freq;
    g.gain.value = vol || 0.08;
    o.connect(g); g.connect(audioCtx.destination);
    o.start();
    g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
    o.stop(audioCtx.currentTime + dur);
  } catch (e) { /* الصوت غير متاح */ }
}
const snd = {
  tap: function () { beep(520, 0.08, 'triangle'); },
  good: function () { beep(660, 0.12, 'sine'); beep(880, 0.18, 'sine'); },
  bad: function () { beep(180, 0.2, 'sawtooth', 0.05); },
  win: function () { [523, 659, 784, 1046].forEach(function (f, i) { setTimeout(function () { beep(f, 0.22, 'sine'); }, i * 110); }); }
};

/* ---------------- أدوات ---------------- */
const app = document.getElementById('app');

function el(tag, cls, text) {
  const n = document.createElement(tag);
  if (cls) n.className = cls;
  if (text !== undefined) n.textContent = text;
  return n;
}
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    const t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}
function starsRow(n, size) {
  const wrap = el('div', 'stars' + (size ? ' stars-' + size : ''));
  for (let i = 0; i < 3; i++) wrap.appendChild(el('span', 'star' + (i < n ? ' on' : ''), '★'));
  return wrap;
}
function confetti() {
  const colors = ['#FFC93C', '#2EE6A8', '#FF5C7A', '#6C8CFF', '#C77DFF'];
  for (let i = 0; i < 60; i++) {
    const p = el('div', 'confetti');
    p.style.left = Math.random() * 100 + 'vw';
    p.style.background = colors[i % colors.length];
    p.style.animationDelay = (Math.random() * 0.6) + 's';
    p.style.animationDuration = (1.6 + Math.random() * 1.4) + 's';
    p.style.setProperty('--rot', (Math.random() * 720 - 360) + 'deg');
    document.body.appendChild(p);
    setTimeout(function () { p.remove(); }, 3400);
  }
}

/* ---------------- الهيكل العام ---------------- */
function render() {
  app.innerHTML = '';
  document.querySelectorAll('.modal-back').forEach(function (m) { m.remove(); });
  if (state.screen === 'home') renderHome();
  else if (state.screen === 'levels') renderLevels();
  else if (state.screen === 'play') renderPlay();
}

function topBar(title, backTo) {
  const bar = el('header', 'topbar');
  const back = el('button', 'btn-icon', backTo ? '→' : '');
  back.setAttribute('aria-label', 'رجوع');
  if (backTo) back.addEventListener('click', function () { snd.tap(); state.screen = backTo; render(); });
  else back.style.visibility = 'hidden';
  bar.appendChild(back);
  bar.appendChild(el('h1', 'topbar-title', title));
  const right = el('div', 'topbar-right');
  const langBtn = el('button', 'btn-lang', state.lang === 'ar' ? 'عربي' : 'EN');
  langBtn.title = 'لغة الكلمات في الألعاب';
  langBtn.addEventListener('click', function () {
    snd.tap();
    state.lang = state.lang === 'ar' ? 'en' : 'ar';
    if (state.screen === 'play') state.screen = 'levels';
    render();
  });
  right.appendChild(langBtn);
  const sc = el('div', 'score-pill');
  sc.appendChild(el('span', 'score-star', '★'));
  sc.appendChild(el('span', '', String(totalStars())));
  right.appendChild(sc);
  bar.appendChild(right);
  return bar;
}

/* ---------------- الشاشة الرئيسية ---------------- */
function renderHome() {
  app.appendChild(topBar('عالم الحروف', null));
  const hero = el('section', 'hero');
  const float = el('div', 'float-letters');
  'أبجدWORDقلمس'.split('').forEach(function (ch, i) {
    const f = el('span', 'float-ch', ch);
    f.style.animationDelay = (i * 0.7) + 's';
    f.style.left = (5 + (i * 8.2) % 90) + '%';
    float.appendChild(f);
  });
  hero.appendChild(float);
  hero.appendChild(el('h2', 'hero-title', 'عالم الحروف'));
  hero.appendChild(el('p', 'hero-sub', '٤ ألعاب كلمات بالعربي والإنجليزي • ' + '٣٥ مستوى'));
  app.appendChild(hero);

  const grid = el('main', 'game-grid');
  GAMES.forEach(function (g) {
    const card = el('button', 'game-card');
    card.appendChild(el('div', 'game-icon', g.icon));
    const info = el('div', 'game-info');
    info.appendChild(el('h3', '', g.name));
    info.appendChild(el('p', '', g.desc));
    card.appendChild(info);
    const prog = getProg(g.id);
    const done = Object.keys(prog.stars).length;
    const meta = el('div', 'game-meta');
    meta.appendChild(el('span', 'game-progress', done + ' / ' + levelCount(g.id)));
    const gs = Object.values(prog.stars).reduce(function (a, b) { return a + b; }, 0);
    meta.appendChild(el('span', 'game-stars', '★ ' + gs));
    card.appendChild(meta);
    card.addEventListener('click', function () {
      snd.tap();
      state.game = g.id; state.screen = 'levels'; render();
    });
    grid.appendChild(card);
  });
  app.appendChild(grid);
  app.appendChild(el('footer', 'foot', 'التقدم يُحفظ خلال الجلسة الحالية'));
}

/* ---------------- شاشة المستويات ---------------- */
function renderLevels() {
  const g = GAMES.find(function (x) { return x.id === state.game; });
  app.appendChild(topBar(g.icon + ' ' + g.name, 'home'));
  const prog = getProg(g.id);
  const wrap = el('main', 'levels-wrap');
  if (g.id !== 'memory') {
    wrap.appendChild(el('p', 'levels-lang', state.lang === 'ar' ? 'كلمات عربية' : 'English words'));
  }
  const grid = el('div', 'levels-grid');
  const count = levelCount(g.id);
  for (let i = 0; i < count; i++) {
    const locked = i + 1 > prog.unlocked;
    const b = el('button', 'level-btn' + (locked ? ' locked' : ''));
    b.appendChild(el('span', 'level-num', locked ? '🔒' : String(i + 1)));
    b.appendChild(starsRow(prog.stars[i] || 0, 'sm'));
    if (!locked) {
      b.addEventListener('click', function () {
        snd.tap();
        state.level = i; state.screen = 'play'; render();
      });
    }
    grid.appendChild(b);
  }
  wrap.appendChild(grid);
  app.appendChild(wrap);
}

/* ---------------- شاشة اللعب ---------------- */
function renderPlay() {
  const g = GAMES.find(function (x) { return x.id === state.game; });
  app.appendChild(topBar(g.name + ' — مستوى ' + (state.level + 1), 'levels'));
  const area = el('main', 'play-area');
  app.appendChild(area);
  if (g.id === 'wordle') playWordle(area);
  else if (g.id === 'scramble') playScramble(area);
  else if (g.id === 'hangman') playHangman(area);
  else if (g.id === 'memory') playMemory(area);
}

function finishLevel(stars) {
  const prog = getProg(state.game);
  prog.stars[state.level] = Math.max(prog.stars[state.level] || 0, stars);
  if (state.level + 1 >= prog.unlocked) {
    prog.unlocked = Math.min(state.level + 2, levelCount(state.game));
  }
  snd.win();
  confetti();
  showModal(true, stars);
}

function showModal(won, stars) {
  const back = el('div', 'modal-back');
  const box = el('div', 'modal');
  box.appendChild(el('div', 'modal-emoji', won ? '🎉' : '💔'));
  box.appendChild(el('h2', '', won ? 'أحسنت!' : 'حاول مرة أخرى'));
  if (won) box.appendChild(starsRow(stars, 'lg'));
  const btns = el('div', 'modal-btns');
  if (won && state.level + 1 < levelCount(state.game)) {
    const next = el('button', 'btn primary', 'المستوى التالي');
    next.addEventListener('click', function () { snd.tap(); state.level++; state.screen = 'play'; render(); });
    btns.appendChild(next);
  } else if (won) {
    box.appendChild(el('p', 'modal-note', 'أكملت جميع المستويات! 🏆'));
  }
  const retry = el('button', 'btn' + (won ? '' : ' primary'), won ? 'إعادة' : 'إعادة المحاولة');
  retry.addEventListener('click', function () { snd.tap(); state.screen = 'play'; render(); });
  btns.appendChild(retry);
  const home = el('button', 'btn', 'المستويات');
  home.addEventListener('click', function () { snd.tap(); state.screen = 'levels'; render(); });
  btns.appendChild(home);
  box.appendChild(btns);
  back.appendChild(box);
  document.body.appendChild(back);
}

/* ---------------- لوحة المفاتيح ---------------- */
function buildKeyboard(container, onKey, onEnter, onBack, withEnter) {
  const rows = state.lang === 'ar' ? AR_KEY_ROWS : EN_KEY_ROWS;
  const kb = el('div', 'keyboard');
  kb.dir = state.lang === 'ar' ? 'rtl' : 'ltr';
  const keyEls = {};
  rows.forEach(function (row, ri) {
    const r = el('div', 'kb-row');
    if (ri === rows.length - 1 && withEnter) {
      const enter = el('button', 'kb-key kb-wide', '✔');
      enter.setAttribute('aria-label', 'تأكيد');
      enter.addEventListener('click', onEnter);
      r.appendChild(enter);
    }
    row.forEach(function (ch) {
      const k = el('button', 'kb-key', ch);
      k.addEventListener('click', function () { onKey(ch); });
      keyEls[ch] = k;
      r.appendChild(k);
    });
    if (ri === rows.length - 1 && onBack) {
      const bk = el('button', 'kb-key kb-wide', '⌫');
      bk.setAttribute('aria-label', 'حذف');
      bk.addEventListener('click', onBack);
      r.appendChild(bk);
    }
    kb.appendChild(r);
  });
  container.appendChild(kb);
  return keyEls;
}

/* ============================================================
   ١) خمّن الكلمة (Wordle)
   ============================================================ */
function playWordle(area) {
  const target = DATA.wordle[state.lang][state.level];
  const len = target.length;
  const maxTries = 6;
  let row = 0, cur = '';
  let over = false;

  area.appendChild(el('p', 'hint-line', 'خمّن كلمة من ' + len + ' حروف — لديك ' + maxTries + ' محاولات'));

  const board = el('div', 'wordle-board');
  board.dir = state.lang === 'ar' ? 'rtl' : 'ltr';
  const cells = [];
  for (let r = 0; r < maxTries; r++) {
    const rowEl = el('div', 'wordle-row');
    const rowCells = [];
    for (let c = 0; c < len; c++) {
      const cell = el('div', 'tile');
      rowEl.appendChild(cell);
      rowCells.push(cell);
    }
    board.appendChild(rowEl);
    cells.push(rowCells);
  }
  area.appendChild(board);

  const msg = el('p', 'play-msg', '');
  area.appendChild(msg);

  function paint() {
    for (let c = 0; c < len; c++) {
      cells[row][c].textContent = cur[c] || '';
      cells[row][c].classList.toggle('filled', !!cur[c]);
    }
  }
  function evalGuess(guess) {
    const res = new Array(len).fill('absent');
    const t = target.split('');
    for (let i = 0; i < len; i++) {
      if (t[i] === guess[i]) { res[i] = 'correct'; t[i] = null; }
    }
    for (let i = 0; i < len; i++) {
      if (res[i] !== 'correct') {
        const j = t.indexOf(guess[i]);
        if (j > -1) { res[i] = 'present'; t[j] = null; }
      }
    }
    return res;
  }
  const rank = { absent: 0, present: 1, correct: 2 };

  const keys = buildKeyboard(area,
    function (ch) {
      if (over || cur.length >= len) return;
      snd.tap(); cur += ch; paint();
    },
    function () {
      if (over) return;
      if (cur.length < len) { msg.textContent = 'أكمل الحروف أولاً'; snd.bad(); return; }
      msg.textContent = '';
      const res = evalGuess(cur);
      for (let i = 0; i < len; i++) {
        const cell = cells[row][i];
        (function (cell, cls, delay) {
          setTimeout(function () { cell.classList.add('flip', cls); }, delay);
        })(cell, res[i], i * 120);
        const k = keys[cur[i]];
        if (k) {
          const prev = k.dataset.state || '';
          if (!prev || rank[res[i]] > rank[prev]) {
            k.dataset.state = res[i];
            k.classList.remove('absent', 'present', 'correct');
            k.classList.add(res[i]);
          }
        }
      }
      if (cur === target) {
        over = true;
        const st = row <= 1 ? 3 : (row <= 3 ? 2 : 1);
        setTimeout(function () { finishLevel(st); }, len * 120 + 350);
        return;
      }
      snd.tap();
      row++; cur = '';
      if (row >= maxTries) {
        over = true;
        setTimeout(function () {
          msg.textContent = 'الكلمة كانت: ' + target;
          snd.bad();
          showModal(false, 0);
        }, len * 120 + 300);
      }
    },
    function () {
      if (over || !cur.length) return;
      cur = cur.slice(0, -1); paint();
    },
    true
  );
}

/* ============================================================
   ٢) رتّب الحروف
   ============================================================ */
function playScramble(area) {
  const item = DATA.scramble[state.lang][state.level];
  const word = item.w;
  let mistakes = 0;
  let picked = [];

  area.appendChild(el('p', 'hint-line', '💡 ' + item.h));

  const answer = el('div', 'scr-answer');
  answer.dir = state.lang === 'ar' ? 'rtl' : 'ltr';
  area.appendChild(answer);

  const pool = el('div', 'scr-pool');
  pool.dir = state.lang === 'ar' ? 'rtl' : 'ltr';
  area.appendChild(pool);

  const msg = el('p', 'play-msg', '');
  area.appendChild(msg);

  let letters = word.split('');
  let shuffled = shuffle(letters);
  let guard = 0;
  while (shuffled.join('') === word && guard < 20) { shuffled = shuffle(letters); guard++; }

  const slots = [];
  letters.forEach(function () {
    const s = el('div', 'tile slot');
    answer.appendChild(s);
    slots.push(s);
  });

  const tileBtns = [];
  shuffled.forEach(function (ch, idx) {
    const t = el('button', 'tile pick', ch);
    t.addEventListener('click', function () {
      if (t.classList.contains('used') || picked.length >= letters.length) return;
      snd.tap();
      t.classList.add('used');
      picked.push({ ch: ch, btn: t });
      redraw();
      if (picked.length === letters.length) check();
    });
    pool.appendChild(t);
    tileBtns.push(t);
  });

  function redraw() {
    slots.forEach(function (s, i) {
      s.textContent = picked[i] ? picked[i].ch : '';
      s.classList.toggle('filled', !!picked[i]);
      s.classList.remove('wrong');
    });
  }
  function check() {
    const guess = picked.map(function (p) { return p.ch; }).join('');
    if (guess === word) {
      snd.good();
      slots.forEach(function (s) { s.classList.add('correct'); });
      const st = mistakes === 0 ? 3 : (mistakes === 1 ? 2 : 1);
      setTimeout(function () { finishLevel(st); }, 500);
    } else {
      mistakes++;
      snd.bad();
      slots.forEach(function (s) { s.classList.add('wrong'); });
      msg.textContent = 'ترتيب غير صحيح، حاول مجدداً';
      setTimeout(function () {
        picked.forEach(function (p) { p.btn.classList.remove('used'); });
        picked = [];
        redraw();
        msg.textContent = '';
      }, 800);
    }
  }

  const undo = el('button', 'btn', 'تراجع عن آخر حرف');
  undo.addEventListener('click', function () {
    if (!picked.length) return;
    snd.tap();
    const last = picked.pop();
    last.btn.classList.remove('used');
    redraw();
  });
  area.appendChild(undo);
}

/* ============================================================
   ٣) أنقذ القلوب
   ============================================================ */
function playHangman(area) {
  const item = DATA.hangman[state.lang][state.level];
  const word = item.w;
  const unique = {};
  word.split('').forEach(function (c) { unique[c] = true; });
  let lives = 6;
  let found = {};
  let over = false;

  area.appendChild(el('p', 'hint-line', 'الفئة: ' + item.c));

  const heartsEl = el('div', 'hearts');
  area.appendChild(heartsEl);

  const wordEl = el('div', 'hm-word');
  wordEl.dir = state.lang === 'ar' ? 'rtl' : 'ltr';
  area.appendChild(wordEl);

  const msg = el('p', 'play-msg', '');
  area.appendChild(msg);

  function drawHearts() {
    heartsEl.innerHTML = '';
    for (let i = 0; i < 6; i++) {
      heartsEl.appendChild(el('span', 'heart' + (i < lives ? '' : ' lost'), i < lives ? '❤️' : '🤍'));
    }
  }
  function drawWord() {
    wordEl.innerHTML = '';
    word.split('').forEach(function (c) {
      wordEl.appendChild(el('div', 'tile' + (found[c] ? ' correct' : ' slot'), found[c] ? c : ''));
    });
  }
  function isDone() {
    return Object.keys(unique).every(function (c) { return found[c]; });
  }
  drawHearts(); drawWord();

  const keys = buildKeyboard(area, function (ch) {
    if (over) return;
    const k = keys[ch];
    if (k.disabled) return;
    k.disabled = true;
    if (unique[ch]) {
      snd.good();
      found[ch] = true;
      k.classList.add('correct');
      drawWord();
      if (isDone()) {
        over = true;
        const st = lives >= 5 ? 3 : (lives >= 3 ? 2 : 1);
        setTimeout(function () { finishLevel(st); }, 400);
      }
    } else {
      snd.bad();
      lives--;
      k.classList.add('absent');
      drawHearts();
      if (lives <= 0) {
        over = true;
        found = unique;
        drawWord();
        msg.textContent = 'الكلمة كانت: ' + word;
        setTimeout(function () { showModal(false, 0); }, 700);
      }
    }
  }, null, null, false);
}

/* ============================================================
   ٤) ذاكرة الترجمة
   ============================================================ */
function playMemory(area) {
  const pairCount = DATA.memoryLevels[state.level];
  const pairs = shuffle(DATA.memoryPairs).slice(0, pairCount);
  let cards = [];
  pairs.forEach(function (p, id) {
    cards.push({ id: id, text: p[0], lang: 'ar' });
    cards.push({ id: id, text: p[1], lang: 'en' });
  });
  cards = shuffle(cards);

  let flipped = [];
  let matched = 0;
  let moves = 0;
  let lock = false;

  const info = el('p', 'hint-line', 'طابق كل كلمة عربية مع ترجمتها الإنجليزية');
  area.appendChild(info);
  const movesEl = el('p', 'play-msg', 'المحاولات: 0');
  area.appendChild(movesEl);

  const grid = el('div', 'mem-grid');
  const cols = pairCount <= 5 ? 4 : (pairCount <= 8 ? 4 : 5);
  grid.style.gridTemplateColumns = 'repeat(' + cols + ', minmax(0, 1fr))';
  area.appendChild(grid);

  cards.forEach(function (c) {
    const card = el('button', 'mem-card');
    const inner = el('div', 'mem-inner');
    const front = el('div', 'mem-face mem-front', '؟');
    const back = el('div', 'mem-face mem-back', c.text);
    back.dir = c.lang === 'ar' ? 'rtl' : 'ltr';
    if (c.lang === 'en') back.classList.add('mem-en');
    inner.appendChild(front); inner.appendChild(back);
    card.appendChild(inner);
    card.addEventListener('click', function () {
      if (lock || card.classList.contains('open') || card.classList.contains('done')) return;
      snd.tap();
      card.classList.add('open');
      flipped.push({ card: card, data: c });
      if (flipped.length === 2) {
        moves++;
        movesEl.textContent = 'المحاولات: ' + moves;
        lock = true;
        const a = flipped[0], b = flipped[1];
        if (a.data.id === b.data.id) {
          setTimeout(function () {
            a.card.classList.add('done'); b.card.classList.add('done');
            snd.good();
            matched++;
            flipped = []; lock = false;
            if (matched === pairCount) {
              const st = moves <= pairCount + 2 ? 3 : (moves <= pairCount * 1.8 ? 2 : 1);
              setTimeout(function () { finishLevel(st); }, 400);
            }
          }, 450);
        } else {
          setTimeout(function () {
            a.card.classList.remove('open'); b.card.classList.remove('open');
            snd.bad();
            flipped = []; lock = false;
          }, 850);
        }
      }
    });
    grid.appendChild(card);
  });
}

render();
